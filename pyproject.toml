[tool.pytest.ini_options]
testpaths = ["tests", "src/tests"]
addopts = "-ra"
markers = [
    "integration: loads the real serialized PyCaret artifact and Streamlit app",
]

[tool.ruff]
target-version = "py310"
line-length = 88
extend-exclude = ["models", "data"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"src/app.py" = ["E402"]
